### model
model_name_or_path: model/Qwen/Qwen2.5-VL-3B-Instruct
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: config/deepspeed/ds_z3_config.json

### dataset
dataset_dir: dataset
dataset: 
- ur_dataset_hpd
- ur_dataset_llava_critic_113k_pairwise
- ur_dataset_llava_critic_113k_pointwise
- ur_dataset_oip
template: qwen2_vl
cutoff_len: 13000
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/Qwen2.5-VL-3B-Instruct/lora/sft
logging_steps: 1
save_steps: 50
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: swanlab  # choices: [none, wandb, tensorboard, swanlab, mlflow]
swanlab_project: llamafactory
swanlab_run_name: unifiedreward

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.5e-6
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

